<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>TODO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="nav-left">
        <div class="logo">TODO APP</div>
    </div>

    <div class="nav-center">
        <span id="creditsDisplay" class="credits" style="display:none;"></span>
    </div>

    <div class="nav-right">
        <button id="upgradeBtn" onclick="goToPlans()" class="nav-btn upgrade" style="display:none;">Plans</button>
        <button id="logoutBtn" class="nav-btn logout" style="display:none;">Logout</button>
    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <h1>Organize Your Life</h1>
    <p>Simple. Fast. Powerful task management.</p>
</section>

<!-- AUTH -->
<div id="authContainer" class="app auth-card">
    <h2 id="authTitle">Login</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button id="authBtn">Login</button>

        <button id="googleBtn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
            Continue with Google
        </button>
    </div>

    <p id="toggleAuth">Don't have an account? <span>Sign Up</span></p>
</div>

<!-- DASHBOARD -->
<div id="todoContainer" class="app dashboard" style="display:none">

    <div class="dashboard-header">
        <h2>Your Tasks</h2>
        <span id="welcomeMsg"></span>
    </div>

    <div class="input-box modern-input">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addBtn">Add Task</button>
    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
